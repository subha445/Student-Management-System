<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
    <style>
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}
    .stat-box{background:#3498db;color:#fff;padding:15px;border-radius:8px;text-align:center}
    .stat-box h3{margin:0 0 5px 0;font-size:13px}
    .stat-box p{margin:0;font-size:22px;font-weight:700}
    .grade-A{color:#27ae60;font-weight:700}
    .grade-B{color:#2980b9;font-weight:700}
    .grade-C{color:#f39c12;font-weight:700}
    .grade-D{color:#e74c3c;font-weight:700}
    .edit-btn{background:#f39c12;color:#fff;border:none;padding:5px 10px;border-radius:4px;margin-right:5px;cursor:pointer}
    .delete-btn{background:#e74c3c;color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer}
    @media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>

<div class="container">

    <h1>Student Management System</h1>

    <h3 id="totalStudents">Total Students: 0</h3>

    <!-- 📊🏆📉 Stats box add pannirken -->
    <div class="stats">
        <div class="stat-box"><h3>📊 Average</h3><p id="avg">0</p></div>
        <div class="stat-box"><h3>🏆 Highest</h3><p id="high">0</p></div>
        <div class="stat-box"><h3>📉 Lowest</h3><p id="low">0</p></div>
        <div class="stat-box"><h3>🎖️ Grade A Count</h3><p id="gradeA">0</p></div>
    </div>

    <input type="text" id="search" placeholder="Search Student..." onkeyup="searchStudent()">

    <input type="text" id="name" placeholder="Student Name">

    <input type="text" id="roll" placeholder="Roll Number">

    <input type="number" id="marks" placeholder="Marks 0-100" min="0" max="100">

    <button id="addBtn" onclick="addStudent()">Add Student</button>

    <table id="studentTable">
        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Marks</th>
            <th>🎖️ Grade</th>
            <th>Action</th>
        </tr>
    </table>

</div>

<script src="script.js"></script>

</body>
</html>
