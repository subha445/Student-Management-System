<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Management System</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginPage">
  <h2>Login</h2>
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- 📚 APP -->
<div id="app" style="display:none;">

  <h1>Student Management System</h1>

  <input type="text" id="name" placeholder="Name">
  <input type="number" id="roll" placeholder="Roll">
  <input type="number" id="marks" placeholder="Marks">
  <input type="number" id="attendance" placeholder="Attendance">
  <button onclick="addStudent()">Add</button>

  <input type="text" id="search" placeholder="Search..." onkeyup="searchStudent()">

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Roll</th>
        <th>Marks</th>
        <th>Attendance</th>
        <th>Rank</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="studentTable"></tbody>
  </table>

  <h2>📊 Chart</h2>
  <canvas id="chart"></canvas>

</div>

<script src="script.js"></script>
</body>
    </html>
